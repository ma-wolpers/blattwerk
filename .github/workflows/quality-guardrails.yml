name: Quality Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ai-guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install guardrail dependencies
        run: python -m pip install "markdown>=3.5" "PyYAML>=6.0"

      - name: Run AI guardrail check
        run: python tools/ci/check_ai_guardrails.py
