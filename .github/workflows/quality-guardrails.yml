name: Quality Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  blattwerk-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run AI guardrail check
        run: python tools/ci/check_ai_guardrails.py

      - name: Run tests
        run: pytest -q

      - name: Verify integrated Kurzentwurf runtime
        run: |
          test -d app/core/kurzentwurf_runtime
          test -f app/core/kurzentwurf_runtime/build.py
